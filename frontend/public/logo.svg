<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Smooth rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)" />
  
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Code Brackets < > -->
    <path d="M-120,-70 L-190,0 L-120,70" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M120,-70 L190,0 L120,70" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Heartbeat Pulse Line -->
    <path d="M-100,0 L-40,0 L-10,-70 L 30,70 L 60,0 L 100,0" fill="none" stroke="#34d399" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
