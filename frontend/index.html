<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>CodePulse — The Intelligent Code Workspace</title>
    <meta name="description" content="CodePulse is an intelligent coding workspace. Write, run, and review code in 14+ languages with instant AI feedback, a built-in terminal, and a scratch pad." />
    <meta name="author" content="Rohit Kumar" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CodePulse — The Intelligent Code Workspace" />
    <meta property="og:description" content="Write, run, and review code in 14+ languages with instant AI feedback and a built-in terminal." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c6af7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('cr_theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
