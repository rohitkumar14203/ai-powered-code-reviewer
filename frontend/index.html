<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>CodePulse — AI Code Reviews Powered by Gemini</title>
    <meta name="description" content="CodePulse delivers instant, AI-powered code reviews using Gemini 2.5 Flash. 18+ languages, 4 review modes, real-time streaming, and a built-in JS runner." />
    <meta name="author" content="Rohit Kumar" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CodePulse — AI Code Reviews in Real-Time" />
    <meta property="og:description" content="Instant AI code reviews with Gemini 2.5 Flash. 18+ languages, streaming output, and a built-in terminal." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c6af7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('cr_theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
